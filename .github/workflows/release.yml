name: Build desktop installers

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: ${{ matrix.name }} installer
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            platform: windows-latest
            target: x86_64-pc-windows-msvc
          - name: Linux x64
            platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - name: macOS Intel
            platform: macos-13
            target: x86_64-apple-darwin
          - name: macOS Apple Silicon
            platform: macos-14
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Create GitHub release and upload installers
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: ZAILON v__VERSION__
          releaseBody: Download the installer for your operating system. Windows: NSIS/MSI. Linux: AppImage, DEB or RPM. macOS: DMG.
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}
