name: Build desktop installers

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: ${{ matrix.name }} installer
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            platform: windows-latest
            target: x86_64-pc-windows-msvc
          - name: Linux x64
            platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - name: macOS Intel
            platform: macos-13
            target: x86_64-apple-darwin
          - name: macOS Apple Silicon
            platform: macos-14
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Create GitHub release and upload signed installers
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: v__VERSION__
          releaseName: ZAILON v__VERSION__
          releaseBody: >-
            Native ZAILON release with signed in-app update packages.
            Windows: NSIS/MSI. Linux: AppImage, DEB or RPM. macOS: DMG.
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generateReleaseNotes: true
          retryAttempts: 3
          updaterJsonPreferNsis: true
          uploadUpdaterJson: true
          uploadUpdaterSignatures: true
          releaseAssetNamePattern: ZAILON-[platform]-[arch]-[bundle][setup].[ext]
          args: --target ${{ matrix.target }}

  checksums:
    name: Publish SHA-256 checksums
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Build checksums for published installers
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v$(node -p "require('./package.json').version")"
          mkdir release-assets
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" --pattern 'ZAILON-*' --dir release-assets
          find release-assets -type f ! -name '*.sig' -print0 | sort -z | xargs -0 sha256sum > checksums-sha256.txt
          gh release upload "$TAG" checksums-sha256.txt --repo "$GITHUB_REPOSITORY" --clobber
