name: Verify native application

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows native build
            platform: windows-latest
          - name: Linux native build
            platform: ubuntu-22.04
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev patchelf libsecret-1-dev libdbus-1-dev

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Verify frontend
        run: npm run build

      - name: Run native unit tests
        run: python .github/scripts/run-native-tests.py

      - name: Verify native backend
        run: npm run tauri build -- --debug --no-bundle --no-sign
